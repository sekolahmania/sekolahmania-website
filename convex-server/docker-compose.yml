# SekolahMania — self-hosted Convex (Docker)
# Usage:
#   cd convex-server && docker compose up -d
#   docker compose exec backend ./generate_admin_key.sh   # copy FULL key incl. prefix
#
# Ports:
#   3210 → Convex API (deploy target / admin)
#   3211 → HTTP Actions (the endpoint index.html's fetch() calls)
#   6791 → Dashboard UI
#
# Reference: https://github.com/get-convex/convex-backend/blob/main/self-hosted/README.md

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - data:/convex/data
    environment:
      - INSTANCE_NAME=sekolahmania
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      # For production behind a domain, set these to your public URLs, e.g.:
      # - CONVEX_CLOUD_ORIGIN=https://convex-api.sekolahmania.com
      # - CONVEX_SITE_ORIGIN=https://convex.sekolahmania.com
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
